<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSC 2026 Vote</title>
<style>
body{
font-family:Arial,sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.2);
text-align:center;
width:320px;
}
button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:18px;
}
.yes{background:#28a745;color:#fff;}
.no{background:#dc3545;color:#fff;}
</style>
</head>
<body>
<div class="box">
<h2>MCQ + CQ মিলিয়ে পাস চাও?</h2>
<button class="yes">হ্যাঁ</button>
<button class="no">না</button>
<p>Firebase সংযোগ পরের ধাপে যোগ করা হবে।</p>
</div>
</body>
</html>
