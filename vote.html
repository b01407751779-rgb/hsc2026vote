<!DOCTYPE html>
<html>
<head>
<title>HSC 2026 Vote</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f2f2f2;
  padding:30px;
}

.box{
  background:white;
  padding:25px;
  border-radius:15px;
  max-width:400px;
  margin:auto;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:8px;
  background:#008000;
  color:white;
  font-size:18px;
  cursor:pointer;
  margin:10px;
}

h1{
 color:green;
}
</style>

</head>

<body>

<div class="box">

<h1>HSC 2026 Vote</h1>

<h3>আপনি কি MCQ + CQ মিলিয়ে পাস চান?</h3>

<label>
<input type="radio" name="vote" value="yes">
হ্যাঁ
</label>

<br><br>

<label>
<input type="radio" name="vote" value="no">
না
</label>

<br><br>

<button onclick="submitVote()">ভোট দিন</button>

<h3>বর্তমান ভোট:</h3>

<p>হ্যাঁ: <span id="yesCount">0</span></p>

<p>না: <span id="noCount">0</span></p>


<a href="https://chat.whatsapp.com/HZFEEUwOEHQJSMqbX8Ike3?s=cl&p=a&ilr=0&amv=0">
<button>WhatsApp Group Join</button>
</a>


</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyCG3h0M2H_YMs0wQb_UiWP8DaenWDrEDVw",

authDomain: "hsc2026vote.firebaseapp.com",

databaseURL: "https://hsc2026vote-default-rtdb.firebaseio.com",

projectId: "hsc2026vote",

storageBucket: "hsc2026vote.firebasestorage.app",

messagingSenderId: "126199992601",

appId: "1:126199992601:web:098173f31a95b0d8a17588"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);



window.submitVote = async function(){

let choice = document.querySelector('input[name="vote"]:checked');


if(!choice){

alert("একটি অপশন নির্বাচন করুন");

return;

}


let voteRef = ref(db,"votes/"+choice.value);


let snap = await get(voteRef);


let count = snap.exists() ? snap.val() : 0;


await set(voteRef,count+1);


alert("আপনার ভোট গ্রহণ করা হয়েছে");


}



onValue(ref(db,"votes/yes"),(snap)=>{

document.getElementById("yesCount").innerHTML = snap.val() || 0;

});


onValue(ref(db,"votes/no"),(snap)=>{

document.getElementById("noCount").innerHTML = snap.val() || 0;

});


</script>


</body>
</html>
