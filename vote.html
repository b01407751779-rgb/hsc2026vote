<!DOCTYPE html>
<html>
<head>

<title>HSC 2026 Vote</title>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#00c6ff,#0072ff);
padding:20px;
text-align:center;
}


.box{

background:white;
max-width:420px;
margin:auto;
padding:25px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,.3);

}


h1{

color:#008000;
font-size:30px;

}


.question{

font-size:20px;
font-weight:bold;

}


.option{

font-size:18px;

}


button{

background:#008000;
color:white;
border:none;
padding:13px 30px;
font-size:18px;
border-radius:12px;
cursor:pointer;
margin:10px;

}


button:hover{

background:#005900;

}



.result{

background:#f2f2f2;
padding:15px;
border-radius:15px;
margin-top:20px;

}



.number{

font-size:25px;
font-weight:bold;
color:green;

}



.progress{

width:100%;
height:25px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin:10px 0;

}



.yes{

height:100%;
width:0%;
background:green;
color:white;

}



.no{

height:100%;
width:0%;
background:red;
color:white;

}



#joinBox{

display:none;

}



</style>

</head>


<body>


<div class="box">


<h1>HSC 2026 Vote</h1>


<p class="question">
আপনি কি MCQ + CQ মিলিয়ে পাস চান?
</p>


<label class="option">
<input type="radio" name="vote" value="yes">
হ্যাঁ
</label>


<br><br>


<label class="option">
<input type="radio" name="vote" value="no">
না
</label>


<br>


<button onclick="submitVote()">
ভোট দিন
</button>



<div class="result">

<h2>বর্তমান ফলাফল</h2>


<p>
হ্যাঁ ভোট:
<span id="yesCount" class="number">0</span>
</p>


<div class="progress">
<div id="yesBar" class="yes"></div>
</div>


<p>
না ভোট:
<span id="noCount" class="number">0</span>
</p>


<div class="progress">
<div id="noBar" class="no"></div>
</div>



<h3>
মোট ভোট: 
<span id="total">0</span>
</h3>


<h3>
হ্যাঁ: <span id="yesPercent">0%</span>
<br>
না: <span id="noPercent">0%</span>
</h3>



</div>



<div id="joinBox">

<a href="https://chat.whatsapp.com/HZFEEUwOEHQJSMqbX8Ike3">

<button>
WhatsApp Group Join
</button>

</a>

</div>



<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, get, set, onValue } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyCG3h0M2H_YMs0wQb_UiWP8DaenWDrEDVw",

authDomain: "hsc2026vote.firebaseapp.com",

databaseURL: "https://hsc2026vote-default-rtdb.firebaseio.com",

projectId: "hsc2026vote",

storageBucket: "hsc2026vote.firebasestorage.app",

messagingSenderId: "126199992601",

appId: "1:126199992601:web:098173f31a95b0d8a17588"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);



const yesRef = ref(db,"votes/yes");

const noRef = ref(db,"votes/no");



function updateResult(){


get(yesRef).then(y=>{

get(noRef).then(n=>{


let yes = y.val() || 0;

let no = n.val() || 0;


let total = yes + no;



document.getElementById("yesCount").innerHTML=yes;

document.getElementById("noCount").innerHTML=no;

document.getElementById("total").innerHTML=total;



if(total>0){


let yp=(yes/total)*100;

let np=(no/total)*100;


document.getElementById("yesPercent").innerHTML=
yp.toFixed(1)+"%";


document.getElementById("noPercent").innerHTML=
np.toFixed(1)+"%";


document.getElementById("yesBar").style.width=
yp+"%";


document.getElementById("noBar").style.width=
np+"%";


}


});

});

}



onValue(yesRef,updateResult);

onValue(noRef,updateResult);





window.submitVote=function(){


let choice=document.querySelector(
'input[name="vote"]:checked'
);



if(!choice){

alert("একটি অপশন নির্বাচন করুন");

return;

}



let voteRef = choice.value=="yes" ? yesRef : noRef;



get(voteRef).then(snapshot=>{


let old = snapshot.val() || 0;


set(voteRef,old+1).then(()=>{


alert("আপনার ভোট দেওয়া হয়েছে ✅");


// WhatsApp Group এ নিয়ে যাবে

setTimeout(()=>{

setTimeout(()=>{

window.open(
"https://chat.whatsapp.com/HZFEEUwOEHQJSMqbX8Ike3",
"_blank"
);

},1500);


});


});


}


</script>


</body>

</html>
