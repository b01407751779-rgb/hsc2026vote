<!DOCTYPE html>
<html>
<head>
<title>HSC 2026 Vote</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:linear-gradient(135deg,#d4fc79,#96e6a1);
  padding:30px;
}

.box{
  background:white;
  padding:25px;
  border-radius:20px;
  max-width:400px;
  margin:auto;
  box-shadow:0 0 15px #999;
}

h1{
 color:green;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:#008000;
  color:white;
  font-size:18px;
  cursor:pointer;
  margin:10px;
}

button:hover{
 background:#005f00;
}

.count{
 font-size:20px;
 font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<h1>HSC 2026 Vote</h1>

<h3>আপনি কি MCQ + CQ মিলিয়ে পাস চান?</h3>

<label>
<input type="radio" name="vote" value="yes">
হ্যাঁ
</label>

<br><br>

<label>
<input type="radio" name="vote" value="no">
না
</label>

<br><br>

<button onclick="submitVote()">ভোট দিন</button>

<h3>বর্তমান ভোট:</h3>

<p>হ্যাঁ: <span id="yesCount" class="count">0</span></p>

<p>না: <span id="noCount" class="count">0</span></p>


<a href="https://chat.whatsapp.com/HZFEEUwOEHQJSMqbX8Ike3">
<button>WhatsApp Group Join</button>
</a>


</div>


<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, get, set, onValue } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyCG3h0M2H_YMs0wQb_UiWP8DaenWDrEDVw",

authDomain: "hsc2026vote.firebaseapp.com",

databaseURL: "https://hsc2026vote-default-rtdb.firebaseio.com",

projectId: "hsc2026vote",

storageBucket: "hsc2026vote.firebasestorage.app",

messagingSenderId: "126199992601",

appId: "1:126199992601:web:098173f31a95b0d8a17588"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);


const yesRef = ref(db,"votes/yes");
const noRef = ref(db,"votes/no");


// ভোট সংখ্যা দেখানো

onValue(yesRef,(snapshot)=>{
 document.getElementById("yesCount").innerHTML = snapshot.val() || 0;
});


onValue(noRef,(snapshot)=>{
 document.getElementById("noCount").innerHTML = snapshot.val() || 0;
});



// ভোট দেওয়া

window.submitVote = function(){

let choice = document.querySelector('input[name="vote"]:checked');


if(!choice){
 alert("একটি অপশন নির্বাচন করুন");
 return;
}


if(choice.value=="yes"){

 get(yesRef).then((snap)=>{
  let total = snap.val() || 0;
  set(yesRef,total+1);
 });

}


if(choice.value=="no"){

 get(noRef).then((snap)=>{
  let total = snap.val() || 0;
  set(noRef,total+1);
 });

}


alert("ভোট দেওয়া হয়েছে ✅");

}


</script>


</body>
</html>
