<!DOCTYPE html>
<html>
<head>

<title>HSC 2026 Vote</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#00c6ff,#0072ff);
text-align:center;
padding:20px;
}

.box{
background:white;
max-width:420px;
margin:auto;
padding:25px;
border-radius:20px;
box-shadow:0 0 20px #555;
}

h1{
color:green;
}

button{
background:#008000;
color:white;
border:none;
padding:12px 25px;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.result{
margin-top:20px;
background:#eee;
padding:15px;
border-radius:15px;
}

.progress{
height:25px;
background:#ccc;
border-radius:20px;
overflow:hidden;
}

.yesbar{
height:100%;
background:green;
width:0%;
}

.nobar{
height:100%;
background:red;
width:0%;
}

</style>

</head>


<body>


<div class="box">

<h1>HSC 2026 Vote</h1>


<h3>
আপনি কি MCQ + CQ মিলিয়ে পাস চান?
</h3>


<label>
<input type="radio" name="vote" value="yes">
হ্যাঁ
</label>


<br><br>


<label>
<input type="radio" name="vote" value="no">
না
</label>


<br><br>


<button onclick="submitVote()">
ভোট দিন
</button>



<div class="result">

<h2>বর্তমান ফলাফল</h2>


<p>
হ্যাঁ ভোট:
<span id="yesCount">0</span>
</p>


<div class="progress">
<div id="yesBar" class="yesbar"></div>
</div>


<p>
না ভোট:
<span id="noCount">0</span>
</p>


<div class="progress">
<div id="noBar" class="nobar"></div>
</div>


<h3>
মোট ভোট:
<span id="total">0</span>
</h3>


<h3>
হ্যাঁ:
<span id="yesPercent">0%</span>

<br>

না:
<span id="noPercent">0%</span>

</h3>


</div>


</div>



<script type="module">


import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import { getDatabase, ref, get, set, onValue }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";



const firebaseConfig = {

apiKey:"AIzaSyCG3h0M2H_YMs0wQb_UiWP8DaenWDrEDVw",

authDomain:"hsc2026vote.firebaseapp.com",

databaseURL:"https://hsc2026vote-default-rtdb.firebaseio.com",

projectId:"hsc2026vote",

storageBucket:"hsc2026vote.firebasestorage.app",

messagingSenderId:"126199992601",

appId:"1:126199992601:web:098173f31a95b0d8a17588"

};



const app = initializeApp(firebaseConfig);

const db = getDatabase(app);



const yesRef = ref(db,"votes/yes");

const noRef = ref(db,"votes/no");




function updateResult(){


get(yesRef).then(y=>{

get(noRef).then(n=>{


let yes=y.val()||0;

let no=n.val()||0;

let total=yes+no;


document.getElementById("yesCount").innerHTML=yes;

document.getElementById("noCount").innerHTML=no;

document.getElementById("total").innerHTML=total;



if(total>0){


let yp=(yes/total)*100;

let np=(no/total)*100;



document.getElementById("yesPercent").innerHTML=
yp.toFixed(1)+"%";


document.getElementById("noPercent").innerHTML=
np.toFixed(1)+"%";


document.getElementById("yesBar").style.width=
yp+"%";


document.getElementById("noBar").style.width=
np+"%";


}



});

});

}




onValue(yesRef,updateResult);

onValue(noRef,updateResult);





window.submitVote=function(){


let choice=document.querySelector(
'input[name="vote"]:checked'
);



if(!choice){

alert("একটি অপশন নির্বাচন করুন");

return;

}



let voteRef =
choice.value=="yes" ? yesRef : noRef;



get(voteRef).then(s=>{


let old=s.val()||0;


set(voteRef,old+1).then(()=>{


alert("ভোট দেওয়া হয়েছে ✅");


// WhatsApp Auto Join

setTimeout(()=>{


window.location.href=
"https://chat.whatsapp.com/HZFEEUwOEHQJSMqbX8Ike3?s=cl&p=a&ilr=0&amv=0";


},1000);



});


});


}



</script>


</body>
</html>
